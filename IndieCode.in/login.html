<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal Login | IndieCode</title>
  <meta name="description" content="Secure client portal login for IndieCode.">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

  <div class="auth-wrapper">
    <!-- Starfield/Glow Background -->
    <div class="hero-media" aria-hidden="true" style="position:fixed; z-index:-1; width:100%; height:100%;">
      <div class="orb orb-one"></div>
      <div class="orb orb-two"></div>
      <div class="grid-glow"></div>
    </div>
    
    <div class="auth-card reveal-on-scroll reveal-visible">
      <div class="auth-card-inner">
        <a class="brand auth-brand" href="index.html">IndieC&lt;&gt;de</a>
        <h2 class="auth-title">Client Portal</h2>
        <p class="auth-subtitle">Sign in to track your project and manage payments.</p>
        
        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="you@company.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          
          <button type="button" class="button button-primary submit-btn auth-submit" onclick="alert('Supabase Auth Integration Pending Keys')">
            <span>Access Portal</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path>
              <path d="M12 5l7 7-7 7"></path>
            </svg>
          </button>
          
          <div class="auth-links">
            <a href="#">Forgot password?</a>
            <span class="auth-divider">•</span>
            <a href="index.html#contact">Request access</a>
          </div>
          
          <div id="auth-status" class="form-status"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
